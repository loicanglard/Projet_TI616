{% extends "base.html" %}
{% block titre %}Connexion — T.R.A.I.L{% endblock %}
{% block contenu %}
<section class="carte" style="max-width:420px;margin:2rem auto">
    <h1>Connexion</h1>
    <form method="post">
        <div class="champ">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus>
        </div>
        <div class="champ">
            <label for="mdp">Mot de passe</label>
            <input type="password" id="mdp" name="mdp" required>
        </div>
        <div class="champ" style="display:flex;align-items:center;gap:.5rem">
            <input type="checkbox" id="souvenir" name="souvenir">
            <label for="souvenir" style="margin:0">Se souvenir de moi</label>
        </div>
        <button type="submit" class="btn btn-primaire" style="width:100%">Se connecter</button>
    </form>
    <p class="texte-petit texte-doux mt-2">
        Pas encore de compte ? <a href="{{ url_for('auth.inscription') }}">S'inscrire</a>
    </p>
</section>
{% endblock %}

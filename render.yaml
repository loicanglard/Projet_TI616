services:
  - type: web
    name: trail-projet-ti616
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m flask init-db
    startCommand: python -m flask run --host=0.0.0.0 --port=$PORT
    envVars:
      - key: FLASK_APP
        value: app
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false

